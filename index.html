<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Croma</title>
  <link rel="icon" href="Croma.png">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="estilos.css">
</head>
<body>

  <header>
    <img src="Croma.png" alt="logo" class="logo">
    <span class="nombre">Croma</span>
  </header>

  <div id="notif-banner" class="notif-banner">
    <span>Activá las notificaciones para recibir recordatorios.</span>
    <button id="notif-allow-btn">Activar</button>
  </div>

  <main>

    <!-- Selector de fecha -->
    <div class="fecha-bar">
      <select id="sel-month"></select>
      <select id="sel-year"></select>
      <button id="goto-today">Hoy</button>
    </div>

    <!-- Calendario del mes -->
    <div class="calendario">
      <div id="dow-labels" class="dias-semana"></div>
      <div id="cal-grid" class="grilla-dias"></div>
    </div>

    <!-- Panel de tareas del dia -->
    <div class="panel-tareas">

      <div class="cabecera-dia">
        <div>
          <h2 id="day-title">Hoy</h2>
          <small id="day-count"></small>
        </div>
        <div class="anillo-wrap">
          <svg viewBox="0 0 36 36" class="anillo-svg">
            <circle class="anillo-fondo" cx="18" cy="18" r="15.9" fill="none" stroke-width="2.5"/>
            <circle class="anillo-progreso" id="ring-fill" cx="18" cy="18" r="15.9" fill="none" stroke-width="2.5" stroke-dasharray="0 100" stroke-dashoffset="25"/>
          </svg>
          <span id="ring-pct" class="anillo-texto">0%</span>
        </div>
      </div>

      <div class="barra-progreso">
        <div id="progress-fill" class="barra-fill" style="width:0%"></div>
      </div>

      <div id="task-list" class="lista-tareas"></div>

      <!-- Formulario para agregar tarea -->
      <div class="form-agregar">
        <div class="fila">
          <input type="text" id="new-task" placeholder="Nueva tarea..." autocomplete="off">
          <button id="add-btn">+</button>
        </div>
        <div class="fila">
          <input type="time" id="new-time">
          <button id="cat-picker-btn" class="btn-categoria">Categorías</button>
        </div>
        <div id="cat-picker-dropdown" class="dropdown-cats" hidden>
          <div id="cat-picker-list"></div>
        </div>
      </div>

      <!-- Categorías -->
      <div class="seccion-cats">
        <button id="cats-toggle" class="btn-toggle-cats">Categorías ▾</button>
        <div id="cats-body" hidden>
          <div id="cats-list" class="lista-chips"></div>
          <div class="fila-nueva-cat">
            <input type="text" id="new-cat-name" placeholder="Nueva categoría...">
            <input type="color" id="new-cat-color" value="#1D9E75">
            <button id="add-cat-btn">Agregar</button>
          </div>
        </div>
      </div>

    </div>

    <!-- Estadísticas -->
    <div class="estadisticas">
      <div class="stat">
        <span id="stat-done" class="stat-num verde">0</span>
        <span class="stat-label">Completadas hoy</span>
      </div>
      <div class="stat">
        <span id="stat-pending" class="stat-num">0</span>
        <span class="stat-label">Pendientes hoy</span>
      </div>
      <div class="stat">
        <span id="stat-week" class="stat-num">0</span>
        <span class="stat-label">Esta semana</span>
      </div>
    </div>

  </main>

  <div id="toast-container" class="toasts"></div>

  <script src="script.js"></script>
</body>
</html>
